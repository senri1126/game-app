<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター図鑑 - ガチャシミュレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hsr-gold-bright: #f9e27d;
            --hsr-gold-mid: #ceae7b;
            --hsr-gold-dark: #6e5531;
            --hsr-glow: rgba(206, 174, 123, 0.4);
        }

        body {
            background-color: #050608;
            background-image: radial-gradient(circle at center, #1b202e 0%, #050608 100%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid rgba(206, 174, 123, 0.3);
            padding-bottom: 15px;
        }

        .archive-title {
            font-family: 'Shippori Mincho', serif;
            color: var(--hsr-gold-bright);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.1em;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Shippori Mincho', serif;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .collection-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .collection-item:not(.unobtained):hover {
            transform: translateY(-5px);
            border-color: var(--hsr-gold-mid);
            background: rgba(206, 174, 123, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .collection-item.unobtained {
            opacity: 0.5;
        }

        .collection-item-img {
            width: 100%;
            aspect-ratio: 1/1.4;
            object-fit: cover;
            object-position: top;
            border-radius: 6px;
            margin-bottom: 12px;
            background: #000;
        }

        .unobtained .collection-item-img {
            filter: brightness(0);
        }

        .collection-item-name {
            font-size: 0.9rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .unobtained .collection-item-name {
            color: #555;
        }

        .stars {
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .star5 { color: #ffcc00; text-shadow: 0 0 5px #ffcc00; }
        .star4 { color: #cc66ff; text-shadow: 0 0 5px #cc66ff; }
        .star3 { color: #44aaff; }

        /* 詳細モーダル（全身表示用） */
        #detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #detail-img {
            max-height: 90vh;
            position: relative;
            z-index: 2;
        }

        .detail-info {
            position: absolute;
            bottom: 5%;
            width: 100%;
            text-align: center;
            z-index: 3;
        }

        .bg-glow {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: rotate-glow 30s linear infinite;
        }

        @keyframes rotate-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="archive-header">
        <h1 class="archive-title">CHARACTER ARCHIVE</h1>
        <a href="index.html" class="btn-back">タイトルへ戻る</a>
    </div>

    <div id="collection-grid" class="collection-grid">
        <!-- JSで動的に追加 -->
    </div>

    <!-- 詳細表示モーダル -->
    <div id="detail-modal" onclick="closeDetail()">
        <div class="bg-glow"></div>
        <img id="detail-img" src="" alt="Detail">
        <div class="detail-info">
            <div id="detail-stars" class="stars"></div>
            <h2 id="detail-name" style="font-family: 'Shippori Mincho', serif; font-size: 2.5rem; margin: 0; text-shadow: 0 0 10px white;"></h2>
        </div>
    </div>

    <script>
        const CHAR_DB = {
            5: [
                { name: "【星の狩人】サム", img: "image/「【星の狩人】サム」星5.png" },
                { name: "【ホワイトホール】ホーリードラゴン", img: "image/「【ホワイトホール】ホーリードラゴン」星5.png" },
                { name: "【銀河の妖狐】アルタイル", img: "image/「【銀河の妖狐】アルタイル」星5.png" }
            ],
            4: [
                { name: "ゴールドゴーレム", img: "image/「ゴールドゴーレム」星4.png" },
                { name: "ソード将軍", img: "image/「ソード将軍」星4.png" },
                { name: "ドラゴンベビー", img: "image/「ドラゴンベビー」星4.png" },
                { name: "口裂け女", img: "image/「口裂け女」星4.png" },
                { name: "聖ユニコーン", img: "image/「聖ユニコーン」星4.png" }
            ],
            3: [
                { name: "モブ兵士A", img: "image/「モブ兵士A」星3.png" },
                { name: "モブ兵士B", img: "image/「モブ兵士B」星3.png" },
                { name: "ゴブリン", img: "image/「ゴブリン」星3.png" },
                { name: "セイレーン", img: "image/「セイレーン」星3.png" },
                { name: "ミノタウロス", img: "image/「ミノタウロス」星3.png" },
                { name: "河童", img: "image/「河童」星3.png" },
                { name: "狼男", img: "image/「狼男」星3.png" }
            ]
        };

        const OBTAINED_KEY = 'gacha_app_obtained_chars';
        const obtainedChars = new Set(JSON.parse(localStorage.getItem(OBTAINED_KEY) || '[]'));

        function initArchive() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';

            let allChars = [];
            [5, 4, 3].forEach(rarity => {
                CHAR_DB[rarity].forEach(char => {
                    allChars.push({ rarity, data: char });
                });
            });

            allChars.forEach(item => {
                const isObtained = obtainedChars.has(item.data.name);
                const el = document.createElement('div');
                el.className = `collection-item ${isObtained ? '' : 'unobtained'}`;

                let starStr = "";
                for (let i = 0; i < item.rarity; i++) starStr += "✦";

                el.innerHTML = `
                    <img src="${item.data.img}" class="collection-item-img">
                    <div class="collection-item-name">${isObtained ? item.data.name : '？？？？'}</div>
                    <div class="stars star${item.rarity}">${starStr}</div>
                `;

                if (isObtained) {
                    el.onclick = () => showDetail(item);
                }

                grid.appendChild(el);
            });
        }

        function showDetail(item) {
            const modal = document.getElementById('detail-modal');
            const img = document.getElementById('detail-img');
            const nameEl = document.getElementById('detail-name');
            const starsEl = document.getElementById('detail-stars');

            img.src = item.data.img;
            nameEl.innerText = item.data.name;
            let starStr = "";
            for (let i = 0; i < item.rarity; i++) starStr += "✦";
            starsEl.innerText = starStr;
            starsEl.className = `stars star${item.rarity}`;

            modal.style.display = 'flex';
        }

        function closeDetail() {
            document.getElementById('detail-modal').style.display = 'none';
        }

        window.onload = initArchive;
    </script>
</body>
</html>
