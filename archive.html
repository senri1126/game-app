<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター図鑑 - ガチャシミュレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.5">
    <style>
        :root {
            --hsr-gold-bright: #f9e27d;
            --hsr-gold-mid: #ceae7b;
            --hsr-gold-dark: #6e5531;
            --hsr-glow: rgba(206, 174, 123, 0.4);
        }

        body {
            background-color: #050608;
            background-image: radial-gradient(circle at center, #1b202e 0%, #050608 100%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            /* style.cssの干渉を排除 */
            display: block !important;
            height: auto !important;
            overflow: auto !important;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid rgba(206, 174, 123, 0.3);
            padding-bottom: 15px;
        }

        .archive-title {
            font-family: 'Shippori Mincho', serif;
            color: var(--hsr-gold-bright);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.1em;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Shippori Mincho', serif;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-reset {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff8888;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Shippori Mincho', serif;
            font-weight: bold;
            transition: 0.3s;
            margin-right: 15px;
        }

        .btn-reset:hover {
            background: rgba(255, 50, 50, 0.3);
            color: #ffaaaa;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .collection-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .collection-item:not(.unobtained):hover {
            transform: translateY(-5px);
            border-color: var(--hsr-gold-mid);
            background: rgba(206, 174, 123, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .collection-item.unobtained {
            opacity: 0.5;
        }

        .collection-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1.4;
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
        }

        .collection-item-img, .collection-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .collection-bg-img {
            z-index: 0;
        }

        .collection-item-img {
            z-index: 1;
            background: transparent;
        }

        .unobtained .collection-item-img, .unobtained .collection-bg-img {
            filter: brightness(0);
        }

        .collection-item-name {
            font-size: 0.85rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.2;
            min-height: 2.2rem; /* 2行分確保 */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .unobtained .collection-item-name {
            color: #555;
        }

        .stars {
            font-size: 0.8rem !important;
            letter-spacing: 2px !important;
        }

        .star5 { color: #ffcc00; text-shadow: 0 0 5px #ffcc00; }
        .star4 { color: #cc66ff; text-shadow: 0 0 5px #cc66ff; }
        .star3 { color: #44aaff; }

        /* 詳細モーダル（全身表示用） */
        #detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #detail-img {
            max-height: 90vh;
            position: relative;
            z-index: 2;
        }

        .bg-glow {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: rotate-glow 30s linear infinite;
        }

        @keyframes rotate-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* モーダル内の情報配置 */
        .detail-info {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="archive-header">
        <h1 class="archive-title">CHARACTER ARCHIVE</h1>
        <div>
            <button class="btn-reset" onclick="resetCollection()">リセット</button>
            <a href="index.html" class="btn-back">タイトルへ戻る</a>
        </div>
    </div>

    <div id="collection-grid" class="collection-grid">
        <!-- JSで動的に追加 -->
    </div>

    <!-- 詳細表示モーダル -->
    <div id="detail-modal" onclick="closeDetail()">
        <div id="detail-fx"></div> <!-- 特殊エフェクト用 -->
        <div class="bg-glow"></div>
        <img id="detail-bg-img" src="" alt="Background" style="display:none;">
        <img id="detail-img" src="" alt="Detail">
        <div class="detail-info">
            <h2 id="detail-name"></h2>
            <div id="detail-stars" class="stars"></div>
        </div>
    </div>

    <script>
        const CHAR_DB = {
            5: [
                { name: "【星の狩人】サム", img: "image/「【星の狩人】サム」星5.png" },
                { name: "【ホワイトホール】ホーリードラゴン", img: "image/「【ホワイトホール】ホーリードラゴン」星5.png" },
                { name: "【銀河の妖狐】アルタイル", img: "image/「【銀河の妖狐】アルタイル」星5.png" }
            ],
            4: [
                { name: "ゴールドゴーレム", img: "image/「ゴールドゴーレム」星4.png" },
                { name: "ソード将軍", img: "image/「ソード将軍」星4.png" },
                { name: "ドラゴンベビー", img: "image/「ドラゴンベビー」星4.png" },
                { name: "口裂け女", img: "image/「口裂け女」星4.png" },
                { name: "聖ユニコーン", img: "image/「聖ユニコーン」星4.png" }
            ],
            3: [
                { name: "モブ兵士A", img: "image/「モブ兵士A」星3.png" },
                { name: "モブ兵士B", img: "image/「モブ兵士B」星3.png" },
                { name: "ゴブリン", img: "image/「ゴブリン」星3.png" },
                { name: "セイレーン", img: "image/「セイレーン」星3.png" },
                { name: "ミノタウロス", img: "image/「ミノタウロス」星3.png" },
                { name: "河童", img: "image/「河童」星3.png" },
                { name: "狼男", img: "image/「狼男」星3.png" }
            ]
        };

        const OBTAINED_KEY = 'gacha_app_obtained_chars';
        const obtainedChars = new Set(JSON.parse(localStorage.getItem(OBTAINED_KEY) || '[]'));
        let samImageTimer = null;

        function clearSamTimer() {
            if (samImageTimer) {
                clearInterval(samImageTimer);
                samImageTimer = null;
            }
        }

        function initArchive() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';

            let allChars = [];
            [5, 4, 3].forEach(rarity => {
                CHAR_DB[rarity].forEach(char => {
                    allChars.push({ rarity, data: char });
                });
            });

            allChars.forEach(item => {
                const isObtained = obtainedChars.has(item.data.name);
                const el = document.createElement('div');
                el.className = `collection-item ${isObtained ? '' : 'unobtained'}`;

                let starStr = "";
                for (let i = 0; i < item.rarity; i++) starStr += "✦";

                // 名前のパース（【二つ名】名前 の形式なら分ける）
                let displayName = '？？？？';
                if (isObtained) {
                    const fullName = item.data.name;
                    const match = fullName.match(/^(【.+?】)(.+)$/);
                    if (match) {
                        displayName = `<span style="font-size: 0.65rem; opacity: 0.7; display: block;">${match[1]}</span><span>${match[2]}</span>`;
                    } else {
                        displayName = `<span>${fullName}</span>`;
                    }
                }

                // サムの場合、図鑑一覧では2枚目の画像を表示
                let gridImg = item.data.img;
                if (item.data.name.includes('サム')) {
                    gridImg = gridImg.replace('」', '2」');
                }

                // アルタイルの場合、カード背景も表示する
                let bgHtml = '';
                if (item.data.name.includes('アルタイル')) {
                    bgHtml = `<img src="image/アルタイル背景.png" class="collection-bg-img" alt="bg">`;
                }

                el.innerHTML = `
                    <div class="collection-img-wrapper">
                        ${bgHtml}
                        <img src="${gridImg}" class="collection-item-img">
                    </div>
                    <div class="collection-item-name">${displayName}</div>
                    <div class="stars star${item.rarity}">${starStr}</div>
                `;

                if (isObtained) {
                    el.onclick = () => showDetail(item);
                }

                grid.appendChild(el);
            });
        }

        function showDetail(item) {
            const modal = document.getElementById('detail-modal');
            const img = document.getElementById('detail-img');
            const nameEl = document.getElementById('detail-name');
            const starsEl = document.getElementById('detail-stars');
            const bgImg = document.getElementById('detail-bg-img');

            img.style.opacity = '0'; // 残像防止
            img.src = item.data.img;
            
            // 背景画像のリセット
            bgImg.src = '';
            bgImg.style.display = 'none';

            // 名前のパース
            const fullName = item.data.name;
            const match = fullName.match(/^(【.+?】)(.+)$/);
            if (match) {
                nameEl.innerHTML = `<div style="font-size: 1.4rem; opacity: 0.9; margin-bottom: 5px;">${match[1]}</div><div>${match[2]}</div>`;
            } else {
                nameEl.innerHTML = `<div>${fullName}</div>`;
            }

            let starStr = "";
            for (let i = 0; i < item.rarity; i++) starStr += "✦";
            starsEl.innerText = starStr;
            starsEl.className = `stars star${item.rarity}`;

            // 即座に透明度を戻す（図鑑はシルエット演出がないため）
            img.style.opacity = '1';

            // 演出の切り替え（特定キャラは特殊演出）
            img.classList.remove('char-breathing', 'char-altair-breathing', 'char-sam-breathing', 'char-dragon-breathing');
            const fxLayer = document.getElementById('detail-fx');
            fxLayer.className = '';

            clearSamTimer();
            if (item.data.name.includes('サム')) {
                img.classList.add('char-sam-breathing');
                fxLayer.classList.add('sam-fx');

                const firstImgSrc = item.data.img;
                const secondImgSrc = firstImgSrc.replace('」', '2」');
                const preload = new Image();
                preload.src = secondImgSrc;

                const startTime = Date.now();
                samImageTimer = setInterval(() => {
                    const elapsed = (Date.now() - startTime) % 8000;
                    if (elapsed > 5200 && elapsed < 7800) {
                        if (!img.src.includes('2.png')) {
                            img.style.opacity = '0';
                            img.src = secondImgSrc;
                            setTimeout(() => img.style.opacity = '1', 50);
                        }
                    } else {
                        if (img.src.includes('2.png')) {
                            img.style.opacity = '0';
                            img.src = firstImgSrc;
                            setTimeout(() => img.style.opacity = '1', 50);
                        }
                    }
                }, 100);
            } else if (item.data.name.includes('ホーリードラゴン')) {
                img.classList.add('char-dragon-breathing');
            } else if (item.data.name.includes('アルタイル')) {
                img.classList.add('char-altair-breathing');
                fxLayer.classList.add('altair-fx');
                bgImg.src = 'image/アルタイル背景.png';
                bgImg.style.display = 'block';
            } else if (item.rarity === 5) {
                img.classList.add('char-breathing');
            }

            modal.style.display = 'flex';
        }

        function closeDetail() {
            clearSamTimer();
            document.getElementById('detail-modal').style.display = 'none';
        }

        function resetCollection() {
            if (confirm('図鑑の獲得記録をすべてリセットしますか？\nこの操作は取り消せません。')) {
                localStorage.removeItem(OBTAINED_KEY);
                alert('図鑑をリセットしました。');
                location.reload(); // リロードして表示を更新
            }
        }

        window.onload = initArchive;
    </script>
</body>
</html>
