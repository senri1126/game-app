<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけんバトル</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #0a0a14;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* === 背景 === */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 50% 80%, rgba(80, 20, 120, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 20%, rgba(20, 40, 100, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(120, 20, 60, 0.2) 0%, transparent 50%),
                #0a0a14;
            z-index: -1;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* === ヘッダー === */
        .game-header {
            text-align: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffcc00, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stage-info {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 2px;
        }

        /* === バトルエリア === */
        .battle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 80px);
            padding: 10px 20px;
            gap: 10px;
        }

        /* --- キャラクターカード --- */
        .char-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 700px;
        }

        .char-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            max-width: 200px;
        }

        .char-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            transition: transform 0.3s;
        }

        .char-avatar.player-avatar {
            background: linear-gradient(135deg, #1a3a6a, #2a5aaa);
            border: 3px solid rgba(100, 180, 255, 0.6);
            box-shadow: 0 0 30px rgba(50, 120, 255, 0.3);
        }

        .char-avatar.enemy-avatar {
            background: linear-gradient(135deg, #5a1a1a, #aa2a2a);
            border: 3px solid rgba(255, 100, 100, 0.6);
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
        }

        .char-name {
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
        }

        /* --- HPバー --- */
        .hp-bar-container {
            width: 100%;
            max-width: 160px;
        }

        .hp-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 3px;
            color: #ccc;
        }

        .hp-bar-bg {
            width: 100%;
            height: 14px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .hp-bar-fill {
            height: 100%;
            border-radius: 7px;
            transition: width 0.5s ease-out;
            position: relative;
        }

        .hp-bar-fill.player-hp {
            background: linear-gradient(90deg, #00aaff, #00ddff);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 0 10px rgba(0,170,255,0.3);
        }

        .hp-bar-fill.enemy-hp {
            background: linear-gradient(90deg, #ff3333, #ff6666);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 0 10px rgba(255,50,50,0.3);
        }

        /* --- VS表示 --- */
        .vs-badge {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4444, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 10px rgba(255, 100, 0, 0.5));
            animation: vs-pulse 2s ease-in-out infinite;
        }

        @keyframes vs-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- バトルステージ（じゃんけん表示） --- */
        .battle-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            min-height: 120px;
            width: 100%;
            max-width: 500px;
        }

        .hand-display {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .hand-display.active {
            border-color: rgba(255, 200, 0, 0.6);
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.2);
            background: rgba(255, 200, 0, 0.08);
        }

        .result-text {
            font-size: 1.6rem;
            font-weight: 900;
            min-width: 80px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .result-text.show { opacity: 1; }
        .result-text.win { color: #00ddff; text-shadow: 0 0 20px rgba(0,200,255,0.5); }
        .result-text.lose { color: #ff4444; text-shadow: 0 0 20px rgba(255,50,50,0.5); }
        .result-text.draw { color: #ffcc00; text-shadow: 0 0 20px rgba(255,200,0,0.5); }

        /* --- じゃんけんボタン --- */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .action-label {
            font-size: 0.85rem;
            color: #aaa;
            letter-spacing: 2px;
        }

        .hand-buttons {
            display: flex;
            gap: 15px;
        }

        .hand-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            font-size: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .hand-btn:hover {
            transform: scale(1.15);
            border-color: rgba(255, 200, 0, 0.7);
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
            background: rgba(255, 200, 0, 0.1);
        }

        .hand-btn:active {
            transform: scale(0.95);
        }

        .hand-btn.disabled {
            pointer-events: none;
            opacity: 0.3;
        }

        .hand-btn-label {
            position: absolute;
            bottom: -22px;
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
        }

        /* --- ダメージエフェクト --- */
        .damage-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }

        .damage-flash.player-hit {
            background: rgba(255, 0, 0, 0.3);
            animation: flash-hit 0.4s ease-out;
        }

        .damage-flash.enemy-hit {
            background: rgba(0, 150, 255, 0.3);
            animation: flash-hit 0.4s ease-out;
        }

        @keyframes flash-hit {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .shake {
            animation: shake-anim 0.4s ease-out;
        }

        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        /* --- ダメージ数値ポップアップ --- */
        .damage-popup {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 900;
            pointer-events: none;
            animation: damage-float 1s ease-out forwards;
            z-index: 50;
        }

        .damage-popup.to-enemy {
            color: #00ddff;
            text-shadow: 0 0 10px #00aaff, 0 2px 4px rgba(0,0,0,0.8);
        }

        .damage-popup.to-player {
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000, 0 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes damage-float {
            0% { opacity: 1; transform: translateY(0) scale(1.3); }
            60% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }

        /* --- オーバーレイ（勝利・敗北） --- */
        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }

        .overlay.show {
            display: flex;
            animation: overlay-in 0.5s ease-out;
        }

        @keyframes overlay-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .overlay-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 5px;
        }

        .overlay-title.victory {
            background: linear-gradient(135deg, #ffcc00, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 180, 0, 0.5));
        }

        .overlay-title.defeat {
            background: linear-gradient(135deg, #ff3333, #aa0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
        }

        .overlay-sub {
            font-size: 1rem;
            color: #aaa;
        }

        .overlay-btn {
            margin-top: 10px;
            padding: 14px 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 200, 0, 0.6);
            background: linear-gradient(135deg, rgba(255, 200, 0, 0.15), rgba(255, 150, 0, 0.1));
            color: #ffcc00;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .overlay-btn:hover {
            background: linear-gradient(135deg, rgba(255, 200, 0, 0.3), rgba(255, 150, 0, 0.2));
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
            transform: scale(1.05);
        }

        /* --- ナビ --- */
        .nav-back {
            position: fixed;
            top: 12px;
            left: 15px;
            z-index: 300;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-back:hover {
            border-color: rgba(255,255,255,0.5);
            color: #fff;
        }

        /* --- ログ --- */
        .battle-log {
            width: 100%;
            max-width: 500px;
            max-height: 60px;
            overflow-y: auto;
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            line-height: 1.6;
        }

        .battle-log::-webkit-scrollbar { width: 3px; }
        .battle-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="particles" id="particles"></div>
    <div class="damage-flash" id="damage-flash"></div>

    <a href="index.html" class="nav-back">← 戻る</a>

    <div class="game-header">
        <div class="game-title">⚔ じゃんけんバトル ⚔</div>
        <div class="stage-info" id="stage-info">STAGE 1</div>
    </div>

    <div class="battle-area">
        <!-- 敵 -->
        <div class="char-card">
            <div class="char-avatar enemy-avatar" id="enemy-avatar">👹</div>
            <div class="char-name" id="enemy-name">ゴブリン</div>
            <div class="hp-bar-container">
                <div class="hp-label"><span>HP</span><span id="enemy-hp-text">30 / 30</span></div>
                <div class="hp-bar-bg"><div class="hp-bar-fill enemy-hp" id="enemy-hp-bar" style="width:100%"></div></div>
            </div>
        </div>

        <!-- バトルステージ -->
        <div class="battle-stage">
            <div class="hand-display" id="player-hand">？</div>
            <div class="result-text" id="result-text">VS</div>
            <div class="hand-display" id="enemy-hand">？</div>
        </div>

        <!-- プレイヤー -->
        <div class="char-card">
            <div class="hp-bar-container">
                <div class="hp-label"><span>HP</span><span id="player-hp-text">100 / 100</span></div>
                <div class="hp-bar-bg"><div class="hp-bar-fill player-hp" id="player-hp-bar" style="width:100%"></div></div>
            </div>
            <div class="char-name">あなた</div>
            <div class="char-avatar player-avatar" id="player-avatar">🛡️</div>
        </div>

        <!-- じゃんけんボタン -->
        <div class="action-area">
            <div class="action-label">▼ 手を選べ ▼</div>
            <div class="hand-buttons" id="hand-buttons">
                <button class="hand-btn" onclick="play('rock')">
                    ✊
                    <span class="hand-btn-label">グー</span>
                </button>
                <button class="hand-btn" onclick="play('scissors')">
                    ✌️
                    <span class="hand-btn-label">チョキ</span>
                </button>
                <button class="hand-btn" onclick="play('paper')">
                    🖐️
                    <span class="hand-btn-label">パー</span>
                </button>
            </div>
        </div>

        <div class="battle-log" id="battle-log"></div>
    </div>

    <!-- オーバーレイ -->
    <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title"></div>
        <div class="overlay-sub" id="overlay-sub"></div>
        <button class="overlay-btn" id="overlay-btn" onclick="overlayAction()"></button>
    </div>

    <script>
        // === 定数 ===
        const HANDS = { rock: '✊', scissors: '✌️', paper: '🖐️' };
        const WIN_MAP = { rock: 'scissors', scissors: 'paper', paper: 'rock' };

        // === 敵データ ===
        const ENEMIES = [
            { name: 'ゴブリン',       emoji: '👹', hp: 30,  atk: 8,  color: '#44aa44' },
            { name: 'スケルトン',     emoji: '💀', hp: 40,  atk: 10, color: '#aaaaaa' },
            { name: 'オオカミ',       emoji: '🐺', hp: 35,  atk: 12, color: '#6688aa' },
            { name: 'ダークメイジ',   emoji: '🧙', hp: 50,  atk: 15, color: '#8844aa' },
            { name: 'ミノタウロス',   emoji: '🐂', hp: 70,  atk: 18, color: '#aa6633' },
            { name: 'ドラゴン',       emoji: '🐉', hp: 100, atk: 22, color: '#cc2222' },
            { name: '魔王',           emoji: '👿', hp: 150, atk: 30, color: '#880088' },
        ];

        // === ゲーム状態 ===
        let stage = 0;
        let playerHp = 100;
        const playerMaxHp = 100;
        const playerAtk = 15;
        let enemyHp = 0;
        let enemyMaxHp = 0;
        let isPlaying = false;

        // === 初期化 ===
        function init() {
            createParticles();
            loadEnemy();
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${5 + Math.random() * 10}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.width = p.style.height = `${2 + Math.random() * 3}px`;
                container.appendChild(p);
            }
        }

        function loadEnemy() {
            const enemy = ENEMIES[stage];
            enemyHp = enemy.hp;
            enemyMaxHp = enemy.hp;

            document.getElementById('stage-info').textContent = `STAGE ${stage + 1} / ${ENEMIES.length}`;
            document.getElementById('enemy-name').textContent = enemy.name;
            document.getElementById('enemy-avatar').textContent = enemy.emoji;
            updateHpBars();
            resetHands();
            addLog(`${enemy.name}が現れた！`);
        }

        // === じゃんけん処理 ===
        function play(playerChoice) {
            if (isPlaying) return;
            isPlaying = true;
            disableButtons(true);

            const choices = Object.keys(HANDS);
            const enemyChoice = choices[Math.floor(Math.random() * 3)];

            // 手を表示
            document.getElementById('player-hand').textContent = HANDS[playerChoice];
            document.getElementById('player-hand').classList.add('active');

            // 敵の手をアニメーション表示
            const enemyHandEl = document.getElementById('enemy-hand');
            let shuffleCount = 0;
            const shuffleInterval = setInterval(() => {
                enemyHandEl.textContent = HANDS[choices[shuffleCount % 3]];
                shuffleCount++;
            }, 80);

            setTimeout(() => {
                clearInterval(shuffleInterval);
                enemyHandEl.textContent = HANDS[enemyChoice];
                enemyHandEl.classList.add('active');

                // 勝敗判定
                const resultEl = document.getElementById('result-text');
                resultEl.classList.add('show');

                if (playerChoice === enemyChoice) {
                    // あいこ
                    resultEl.textContent = 'DRAW';
                    resultEl.className = 'result-text show draw';
                    addLog('あいこ！');
                    setTimeout(() => finishRound(), 800);
                } else if (WIN_MAP[playerChoice] === enemyChoice) {
                    // 勝ち - 敵にダメージ
                    resultEl.textContent = 'WIN!';
                    resultEl.className = 'result-text show win';
                    const dmg = playerAtk + Math.floor(Math.random() * 6);
                    enemyHp = Math.max(0, enemyHp - dmg);
                    showDamageEffect('enemy', dmg);
                    addLog(`${dmg}ダメージを与えた！`);
                    setTimeout(() => {
                        updateHpBars();
                        if (enemyHp <= 0) {
                            setTimeout(() => enemyDefeated(), 600);
                        } else {
                            finishRound();
                        }
                    }, 500);
                } else {
                    // 負け - プレイヤーにダメージ
                    resultEl.textContent = 'LOSE';
                    resultEl.className = 'result-text show lose';
                    const enemy = ENEMIES[stage];
                    const dmg = enemy.atk + Math.floor(Math.random() * 5);
                    playerHp = Math.max(0, playerHp - dmg);
                    showDamageEffect('player', dmg);
                    addLog(`${dmg}ダメージを受けた！`);
                    setTimeout(() => {
                        updateHpBars();
                        if (playerHp <= 0) {
                            setTimeout(() => gameOver(), 600);
                        } else {
                            finishRound();
                        }
                    }, 500);
                }
            }, 600);
        }

        function finishRound() {
            isPlaying = false;
            disableButtons(false);
        }

        function resetHands() {
            document.getElementById('player-hand').textContent = '？';
            document.getElementById('player-hand').classList.remove('active');
            document.getElementById('enemy-hand').textContent = '？';
            document.getElementById('enemy-hand').classList.remove('active');
            const resultEl = document.getElementById('result-text');
            resultEl.textContent = 'VS';
            resultEl.className = 'result-text show';
            resultEl.style.color = '#666';
        }

        // === ダメージ演出 ===
        function showDamageEffect(target, dmg) {
            const flash = document.getElementById('damage-flash');
            flash.className = 'damage-flash';
            void flash.offsetWidth; // reflow
            flash.classList.add(target === 'player' ? 'player-hit' : 'enemy-hit');

            const avatarId = target === 'player' ? 'player-avatar' : 'enemy-avatar';
            const avatar = document.getElementById(avatarId);
            avatar.classList.remove('shake');
            void avatar.offsetWidth;
            avatar.classList.add('shake');

            // ダメージ数値ポップアップ
            const popup = document.createElement('div');
            popup.className = `damage-popup ${target === 'player' ? 'to-player' : 'to-enemy'}`;
            popup.textContent = `-${dmg}`;
            avatar.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // === HP更新 ===
        function updateHpBars() {
            const pPct = (playerHp / playerMaxHp) * 100;
            const ePct = (enemyHp / enemyMaxHp) * 100;
            document.getElementById('player-hp-bar').style.width = `${pPct}%`;
            document.getElementById('enemy-hp-bar').style.width = `${ePct}%`;
            document.getElementById('player-hp-text').textContent = `${playerHp} / ${playerMaxHp}`;
            document.getElementById('enemy-hp-text').textContent = `${enemyHp} / ${enemyMaxHp}`;
        }

        // === ボタン制御 ===
        function disableButtons(disabled) {
            document.querySelectorAll('.hand-btn').forEach(b => {
                b.classList.toggle('disabled', disabled);
            });
        }

        // === 敵撃破 ===
        function enemyDefeated() {
            const enemy = ENEMIES[stage];
            stage++;

            if (stage >= ENEMIES.length) {
                // 全クリア
                showOverlay('VICTORY', `全ての敵を倒した！\nあなたは真の勇者だ！`, '最初から', 'victory');
            } else {
                // 次のステージ
                // HP少し回復
                playerHp = Math.min(playerMaxHp, playerHp + 20);
                addLog(`${enemy.name}を倒した！ HP20回復！`);
                updateHpBars();
                setTimeout(() => {
                    resetHands();
                    loadEnemy();
                    disableButtons(false);
                    isPlaying = false;
                }, 800);
            }
        }

        // === ゲームオーバー ===
        function gameOver() {
            showOverlay('GAME OVER', `STAGE ${stage + 1} で力尽きた…`, 'リトライ', 'defeat');
        }

        // === オーバーレイ ===
        function showOverlay(title, sub, btnText, type) {
            const overlay = document.getElementById('overlay');
            const titleEl = document.getElementById('overlay-title');
            const subEl = document.getElementById('overlay-sub');
            const btnEl = document.getElementById('overlay-btn');

            titleEl.textContent = title;
            titleEl.className = `overlay-title ${type}`;
            subEl.textContent = sub;
            btnEl.textContent = btnText;
            overlay.classList.add('show');
            disableButtons(true);
        }

        function overlayAction() {
            document.getElementById('overlay').classList.remove('show');
            stage = 0;
            playerHp = playerMaxHp;
            document.getElementById('battle-log').innerHTML = '';
            updateHpBars();
            resetHands();
            loadEnemy();
            disableButtons(false);
            isPlaying = false;
        }

        // === ログ ===
        function addLog(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // === 起動 ===
        init();
    </script>
</body>
</html>
