<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPGバトル - ガチャシミュレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css?v=2.0">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="particles" id="particles"></div>
    <div class="damage-flash" id="damage-flash"></div>

    <a href="index.html" class="nav-back">← 戻る</a>

    <div class="game-header">
        <div class="game-title">⚔ CHARACTER BATTLE ⚔</div>
        <div class="stage-info" id="stage-info">STAGE 1 / 3</div>
    </div>

    <div class="battle-area">
        <!-- 敵 -->
        <div class="char-card enemy-side">
            <div class="char-avatar enemy-avatar" id="enemy-avatar">👹</div>
            <div class="char-name" id="enemy-name">スライム</div>
            <div class="hp-bar-container">
                <div class="hp-label"><span>HP</span><span id="enemy-hp-text">50 / 50</span></div>
                <div class="hp-bar-bg"><div class="hp-bar-fill enemy-hp" id="enemy-hp-bar" style="width:100%"></div></div>
            </div>
        </div>

        <div class="vs-badge">VS</div>

        <!-- プレイヤー -->
        <div class="char-card player-side">
            <div class="hp-bar-container">
                <div class="hp-label"><span>HP</span><span id="player-hp-text">100 / 100</span></div>
                <div class="hp-bar-bg"><div class="hp-bar-fill player-hp" id="player-hp-bar" style="width:100%"></div></div>
            </div>
            <div class="char-name" id="player-name">勇者</div>
            <div class="char-avatar player-avatar" id="player-avatar">🛡️</div>
            <div class="player-stats">
                <span id="player-rarity">★★★</span> | ATK: <span id="player-atk-val">10</span>
            </div>
        </div>

        <!-- コマンドエリア -->
        <div class="action-area">
            <div class="command-grid" id="command-buttons">
                <button class="command-btn" onclick="executeCommand('attack')">
                    <span class="cmd-icon">⚔️</span>
                    <span class="cmd-label">たたかう</span>
                </button>
                <button class="command-btn" onclick="executeCommand('evade')">
                    <span class="cmd-icon">💨</span>
                    <span class="cmd-label">よける</span>
                </button>
                <button class="command-btn special" id="btn-special" onclick="executeCommand('special')">
                    <span class="cmd-icon">🔥</span>
                    <span class="cmd-label">ひっさつ</span>
                    <span class="cooldown-overlay" id="special-cooldown"></span>
                </button>
                <button class="command-btn item" id="btn-item" onclick="executeCommand('item')">
                    <span class="cmd-icon">🧪</span>
                    <span class="cmd-label">どうぐ</span>
                    <span class="item-count" id="item-count">3</span>
                </button>
            </div>
        </div>

        <div class="battle-log" id="battle-log"></div>
    </div>

    <!-- オーバーレイ -->
    <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title"></div>
        <div class="overlay-sub" id="overlay-sub"></div>
        <button class="overlay-btn" id="overlay-btn" onclick="overlayAction()"></button>
    </div>

    <script>
        // === キャラクターDB (index.htmlと同期させるのが理想だが、ここでは簡易的に保持) ===
        const CHAR_STATS = {
            5: { hp: 500, atk: 80, speed: 40, color: '#ffcc00' },
            4: { hp: 250, atk: 35, speed: 15, color: '#c724b1' },
            3: { hp: 120, atk: 12, speed: 5,  color: '#00a8ff' }
        };

        const ENEMIES = [
            { name: '迷いスライム',   emoji: '💧', hp: 60,   atk: 8,   speed: 2,  desc: '森に迷い込んだ弱いスライム。' },
            { name: '帝国の重装歩兵', emoji: '💂', hp: 400,  atk: 45,  speed: 10, desc: '訓練された兵士。防御力が高い。' },
            { name: '魔王の化身',     emoji: '👿', hp: 1500, atk: 120, speed: 30, desc: '全てを破壊する恐怖の化身。' }
        ];

        // === ゲーム状態 ===
        let stage = 0;
        let player = {
            name: '勇者',
            rarity: 3,
            hp: 100,
            maxHp: 100,
            atk: 10,
            speed: 5,
            itemCount: 3,
            specialCooldown: 0,
            isEvading: false
        };
        let enemyHp = 0;
        let enemyMaxHp = 0;
        let isTurnTransition = false;

        // === 初期化 ===
        function init() {
            createParticles();
            setupPlayer();
            loadEnemy();
        }

        function setupPlayer() {
            const OBTAINED_KEY = 'game_app_obtained_chars';
            const obtained = JSON.parse(localStorage.getItem(OBTAINED_KEY) || '[]');
            
            // 獲得済みキャラから最強のものを選択（簡易ロジック）
            let bestRarity = 3;
            let bestName = '見習い冒険者';
            
            // 本当はCHAR_DBを参照したいが、ここでは簡易的に判定
            obtained.forEach(name => {
                if (name.includes('サム') || name.includes('ドラゴン') || name.includes('アルタイル')) {
                    bestRarity = 5;
                    bestName = name;
                } else if (bestRarity < 4 && (name.includes('ゴーレム') || name.includes('将軍'))) {
                    bestRarity = 4;
                    bestName = name;
                }
            });

            const stats = CHAR_STATS[bestRarity];
            player.name = bestName;
            player.rarity = bestRarity;
            player.maxHp = stats.hp;
            player.hp = stats.hp;
            player.atk = stats.atk;
            player.speed = stats.speed;

            document.getElementById('player-name').textContent = player.name;
            document.getElementById('player-atk-val').textContent = player.atk;
            document.getElementById('player-rarity').textContent = '★'.repeat(player.rarity);
            document.getElementById('player-rarity').style.color = stats.color;
            
            // アイコンの設定（簡易）
            const avatar = document.getElementById('player-avatar');
            if (bestName.includes('サム')) avatar.textContent = '🏹';
            else if (bestName.includes('ドラゴン')) avatar.textContent = '🐉';
            else if (bestName.includes('アルタイル')) avatar.textContent = '🦊';
            else if (bestRarity === 4) avatar.textContent = '⚔️';
            else avatar.textContent = '🛡️';
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${5 + Math.random() * 10}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.width = p.style.height = `${2 + Math.random() * 3}px`;
                container.appendChild(p);
            }
        }

        function loadEnemy() {
            const enemy = ENEMIES[stage];
            enemyHp = enemy.hp;
            enemyMaxHp = enemy.hp;

            document.getElementById('stage-info').textContent = `STAGE ${stage + 1} / ${ENEMIES.length}`;
            document.getElementById('enemy-name').textContent = enemy.name;
            document.getElementById('enemy-avatar').textContent = enemy.emoji;
            updateHpBars();
            addLog(`${enemy.name}が現れた！`);
            if (enemy.desc) addLog(`<span style="color:#aaa; font-size:0.9em;">${enemy.desc}</span>`);
        }

        // === バトルコマンド実行 ===
        async function executeCommand(type) {
            if (isTurnTransition || player.hp <= 0) return;
            isTurnTransition = true;
            disableCommands(true);

            let logMsg = "";
            let damage = 0;

            // 1. プレイヤーの行動
            if (type === 'attack') {
                damage = calculateDamage(player.atk);
                logMsg = `${player.name}の攻撃！ ${damage}のダメージ！`;
                enemyHp = Math.max(0, enemyHp - damage);
                showDamageEffect('enemy', damage);
            } 
            else if (type === 'evade') {
                player.isEvading = true;
                logMsg = `${player.name}は身構えた！ 回避率が大幅にアップ！`;
            }
            else if (type === 'special') {
                if (player.specialCooldown > 0) return;
                damage = calculateDamage(player.atk * 2.5);
                logMsg = `必殺技発動！ ${player.name}の猛攻！ ${damage}のダメージ！`;
                enemyHp = Math.max(0, enemyHp - damage);
                player.specialCooldown = 4; // 次のターンからカウントダウン
                showDamageEffect('enemy', damage, true);
            }
            else if (type === 'item') {
                if (player.itemCount <= 0) return;
                const heal = Math.floor(player.maxHp * 0.5);
                player.hp = Math.min(player.maxHp, player.hp + heal);
                player.itemCount--;
                logMsg = `回復薬を使った！ HPが${heal}回復した！`;
                updateHpBars();
                document.getElementById('item-count').textContent = player.itemCount;
            }

            addLog(logMsg);
            updateHpBars();
            await wait(1000);

            // 敵の撃破チェック
            if (enemyHp <= 0) {
                enemyDefeated();
                return;
            }

            // 2. 敵の行動
            await enemyTurn();

            // ターン終了処理
            if (player.specialCooldown > 0) player.specialCooldown--;
            updateCommandUI();
            
            if (player.hp > 0) {
                isTurnTransition = false;
                disableCommands(false);
            }
        }

        async function enemyTurn() {
            const enemy = ENEMIES[stage];
            let logMsg = "";
            
            addLog(`${enemy.name}のターン！`);
            await wait(600);

            // 回避判定
            if (player.isEvading && Math.random() < 0.7) {
                logMsg = `${player.name}は攻撃をひらりと身をかわした！`;
                player.isEvading = false; // 回避成功で解除
            } else {
                const damage = calculateDamage(enemy.atk);
                player.hp = Math.max(0, player.hp - damage);
                logMsg = `${player.name}は${damage}のダメージを受けた！`;
                showDamageEffect('player', damage);
                player.isEvading = false; // 攻撃を受けたら解除
            }

            addLog(logMsg);
            updateHpBars();
            await wait(800);

            if (player.hp <= 0) {
                gameOver();
            }
        }

        function calculateDamage(baseAtk) {
            const varience = 0.9 + Math.random() * 0.2; // 0.9 ~ 1.1
            return Math.floor(baseAtk * varience);
        }

        function updateCommandUI() {
            const specBtn = document.getElementById('btn-special');
            const specCooldown = document.getElementById('special-cooldown');
            if (player.specialCooldown > 0) {
                specBtn.classList.add('disabled');
                specCooldown.textContent = player.specialCooldown;
            } else {
                specBtn.classList.remove('disabled');
                specCooldown.textContent = '';
            }

            const itemBtn = document.getElementById('btn-item');
            if (player.itemCount <= 0) {
                itemBtn.classList.add('disabled');
            }
        }

        // === ダメージ演出 ===
        function showDamageEffect(target, dmg, isSpecial = false) {
            const flash = document.getElementById('damage-flash');
            flash.className = 'damage-flash';
            void flash.offsetWidth;
            flash.classList.add(target === 'player' ? 'player-hit' : 'enemy-hit');

            const avatarId = target === 'player' ? 'player-avatar' : 'enemy-avatar';
            const avatar = document.getElementById(avatarId);
            avatar.classList.remove('shake', 'hit-effect');
            void avatar.offsetWidth;
            avatar.classList.add('shake');
            if (isSpecial) avatar.classList.add('hit-effect');

            const popup = document.createElement('div');
            popup.className = `damage-popup ${target === 'player' ? 'to-player' : 'to-enemy'}`;
            if (isSpecial) popup.style.fontSize = '2.5rem';
            popup.textContent = `-${dmg}`;
            avatar.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function updateHpBars() {
            const pPct = (player.hp / player.maxHp) * 100;
            const ePct = (enemyHp / enemyMaxHp) * 100;
            document.getElementById('player-hp-bar').style.width = `${pPct}%`;
            document.getElementById('enemy-hp-bar').style.width = `${ePct}%`;
            document.getElementById('player-hp-text').textContent = `${player.hp} / ${player.maxHp}`;
            document.getElementById('enemy-hp-text').textContent = `${enemyHp} / ${enemyMaxHp}`;
            
            // 色の変化
            const pBar = document.getElementById('player-hp-bar');
            if (pPct < 25) pBar.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
            else if (pPct < 50) pBar.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc00)';
            else pBar.style.background = 'linear-gradient(90deg, #00aaff, #00ddff)';
        }

        function disableCommands(disabled) {
            document.querySelectorAll('.command-btn').forEach(b => {
                if (!b.classList.contains('disabled') || !disabled) {
                    b.style.pointerEvents = disabled ? 'none' : 'auto';
                    b.style.opacity = disabled ? '0.6' : '1';
                }
            });
        }

        function enemyDefeated() {
            const enemy = ENEMIES[stage];
            stage++;
            addLog(`${enemy.name}を撃破した！`);

            if (stage >= ENEMIES.length) {
                showOverlay('VICTORY', `魔王の脅威は去った！\n${player.name}の伝説が今始まる…`, '冒険を終える', 'victory');
            } else {
                setTimeout(() => {
                    addLog(`次のステージへ進みます…`);
                    setTimeout(() => {
                        loadEnemy();
                        isTurnTransition = false;
                        disableCommands(false);
                    }, 1000);
                }, 800);
            }
        }

        function gameOver() {
            showOverlay('DEFEAT', `力及ばず、${player.name}は倒れた…`, 'リトライ', 'defeat');
        }

        function showOverlay(title, sub, btnText, type) {
            const overlay = document.getElementById('overlay');
            const titleEl = document.getElementById('overlay-title');
            const subEl = document.getElementById('overlay-sub');
            const btnEl = document.getElementById('overlay-btn');

            titleEl.textContent = title;
            titleEl.className = `overlay-title ${type}`;
            subEl.innerHTML = sub.replace(/\n/g, '<br>');
            btnEl.textContent = btnText;
            overlay.classList.add('show');
        }

        function overlayAction() {
            if (document.getElementById('overlay-btn').textContent === '冒険を終える') {
                location.href = 'index.html';
                return;
            }
            location.reload();
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            const entry = document.createElement('div');
            entry.innerHTML = msg;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        init();
    </script>
</body>
</html>
