<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Simulator</title>
    <!-- 明朝体とゴシック体をロード -->
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.5">
    <link rel="stylesheet" href="index.css?v=1.0">
</head>

<body>

    <!-- ================= 画面1: タイトル画面 ================= -->
    <div id="title-screen" class="warp-container">
        <!-- 図鑑へのリンクボタン（右上） -->
        <a href="archive.html" class="archive-link-btn">
            <span>📖</span> 図鑑
        </a>

        <div class="button-group">
            <!-- 1回引くボタン -->
            <div class="hsr-warp-button" onclick="startGachaProcess(1, this)">
                <span class="text-main">1回引く</span>
                <span class="text-sub">SINGLE WARP</span>
            </div>

            <!-- 10回引くボタン -->
            <div class="hsr-warp-button" onclick="startGachaProcess(10, this)">
                <span class="text-main">10回引く</span>
                <span class="text-sub">MULTI WARP (10)</span>
            </div>
        </div>

        <!-- 排出確率ボタン（右下） -->
        <a href="probability.html" class="prob-link-btn">排出確率</a>
    </div>

    <!-- ================= 画面2: 演出画面 ================= -->
    <div id="anim-screen">
        <button class="skip-btn" onclick="skipEffect()">SKIP</button>about:blank#blocked
        <div class="space-stage" id="star-field"></div>
        <div class="ticket-container">
            <!-- チケット画像 -->
            <img id="anim-ticket" src="image/チケット.png" class="gacha-ticket" alt="Ticket">
        </div>
        <div id="portal"></div>
    </div>

    <!-- ================= 画面3: 結果画面 ================= -->
    <div id="result-screen">
        <div id="result-cards" class="result-container">
            <!-- JSでここにカードが生成されます -->
        </div>
        <div class="result-actions">
            <button class="btn-simple" onclick="returnToTitle()">タイトルへ戻る</button>
        </div>
    </div>

    <!-- ================= 画面3: キャラ登場詳細（全身表示） ================= -->
    <div id="reveal-screen" onclick="nextReveal()">
        <div id="reveal-fx"></div> <!-- 特殊エフェクト用 -->
        <div class="reveal-bg-glow"></div>
        <img id="reveal-bg-img" src="" alt="Background" style="display:none;">
        <img id="reveal-img" src="" alt="Reveal">
        <div id="reveal-info">
            <!-- 名前と二つ名を分けて表示 -->
            <h2 id="reveal-name"></h2>
            <!-- レアリティを下へ -->
            <div id="reveal-stars" class="stars"></div>
        </div>
    </div>

    <!-- ホワイトアウト用共通レイヤー -->
    <div id="flash" class="whiteout"></div>

    <!-- ================= JavaScriptロジック ================= -->
    <script>
        // --- 1. キャラクターデータベース ---
        // ※ imgのURLはご自身の画像URLに書き換えてください。
        const CHAR_DB = {
            5: [
                { name: "【星の狩人】サム", img: "image/「【星の狩人】サム」星5.png" },
                { name: "【ホワイトホール】ホーリードラゴン", img: "image/「【ホワイトホール】ホーリードラゴン」星5.png" },
                { name: "【銀河の妖狐】アルタイル", img: "image/「【銀河の妖狐】アルタイル」星5.png" }
            ],
            4: [
                { name: "ゴールドゴーレム", img: "image/「ゴールドゴーレム」星4.png" },
                { name: "ソード将軍", img: "image/「ソード将軍」星4.png" },
                { name: "ドラゴンベビー", img: "image/「ドラゴンベビー」星4.png" },
                { name: "口裂け女", img: "image/「口裂け女」星4.png" },
                { name: "聖ユニコーン", img: "image/「聖ユニコーン」星4.png" }
            ],
            3: [
                { name: "モブ兵士A", img: "image/「モブ兵士A」星3.png" },
                { name: "モブ兵士B", img: "image/「モブ兵士B」星3.png" },
                { name: "ゴブリン", img: "image/「ゴブリン」星3.png" },
                { name: "セイレーン", img: "image/「セイレーン」星3.png" },
                { name: "ミノタウロス", img: "image/「ミノタウロス」星3.png" },
                { name: "河童", img: "image/「河童」星3.png" },
                { name: "狼男", img: "image/「狼男」星3.png" }
            ]
        };

        // --- 2. 状態管理 ---
        let tenPullPityCount = 0; // 10連で星5が出なかった回数をカウント
        let isAnimationSkipped = false;
        let activePullResults = [];
        let samImageTimer = null; // サムの画像切り替え用タイマー

        // 獲得済みキャラの管理（localStorage版）
        const OBTAINED_KEY = 'gacha_app_obtained_chars';
        const obtainedChars = new Set(JSON.parse(localStorage.getItem(OBTAINED_KEY) || '[]'));

        function clearSamTimer() {
            if (samImageTimer) {
                clearInterval(samImageTimer);
                samImageTimer = null;
            }
        }

        function trackCharacter(name) {
            const isNew = !obtainedChars.has(name);
            if (isNew) {
                obtainedChars.add(name);
                localStorage.setItem(OBTAINED_KEY, JSON.stringify([...obtainedChars]));
            }
            return isNew;
        }

        // --- 3. ガチャ抽選ロジック ---

        // 配列からランダムに1つ選ぶヘルパー関数
        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        // 単発抽選
        function rollSingle() {
            const rand = Math.random() * 100;
            let rarity = 3;
            if (rand < 2.4) rarity = 5;
            else if (rand < 7.4) rarity = 4;

            const char = getRandomItem(CHAR_DB[rarity]);
            const isNew = trackCharacter(char.name);

            return { rarity, data: char, isNew };
        }

        // 10連抽選
        function rollTen() {
            let results = [];
            let hasStar4OrHigher = false;
            let hasStar5 = false;

            // 天井判定 (5回連続で外れていれば、今回は星5確定枠を1つ付与)
            if (tenPullPityCount >= 5) {
                const char = getRandomItem(CHAR_DB[5]);
                const isNew = trackCharacter(char.name);
                results.push({ rarity: 5, data: char, isNew });
                hasStar5 = true;
                // hasStar4OrHigher はここでは立てず、残りの9枠で別途保障を判定させる
                tenPullPityCount = 0; // 天井リセット
            }

            // 残りの枠を抽選
            while (results.length < 10) {
                const result = rollSingle();
                if (result.rarity === 5) hasStar5 = true;
                if (result.rarity >= 4) hasStar4OrHigher = true;
                results.push(result);
            }

            // 【確定枠処理】すべて星3だった場合、最後の1枠を強制的に星4にする
            if (!hasStar4OrHigher) {
                const char = getRandomItem(CHAR_DB[4]);
                const isNew = trackCharacter(char.name);
                results[9] = { rarity: 4, data: char, isNew };
            }

            // カウントの更新
            if (hasStar5) {
                tenPullPityCount = 0; // 星5が出たらリセット
            } else {
                tenPullPityCount++;   // 出なかったらカウントアップ
            }

            const pityEl = document.getElementById('pity-counter-display');
            if (pityEl) pityEl.innerText = tenPullPityCount;

            // 結果をシャッフル（確定枠が常に最初/最後に固まらないように）
            return results.sort(() => Math.random() - 0.5);
        }

        // --- 4. メインシーケンス制御 ---

        async function startGachaProcess(times, btnElement) {
            // ボタンアニメーション発火
            btnElement.classList.add('launching');
            const flash = document.getElementById('flash');

            // 1. 抽選の実行
            let pullResults = [];
            if (times === 1) {
                pullResults.push(rollSingle());
            } else {
                pullResults = rollTen();
            }

            // 2. 引いた中での「最高レアリティ」を特定
            const maxRarity = Math.max(...pullResults.map(item => item.rarity));

            // ホワイトアウトさせてから画面切り替え
            setTimeout(() => {
                flash.classList.add('active-whiteout');

                setTimeout(() => {
                    // タイトルを隠し、アニメーション画面の準備
                    document.getElementById('title-screen').style.display = 'none';
                    btnElement.classList.remove('launching'); // 状態戻す

                    // アニメーション実行へ
                    playIntroAnimation(maxRarity, pullResults);
                }, 400); // 画面が白くなったタイミングで切り替え
            }, 600); // ボタンが飛んでいくのを待つ
        }

        // --- 5. 演出アニメーション ---

        async function playIntroAnimation(maxRarity, pullResults) {
            const animScreen = document.getElementById('anim-screen');
            const flash = document.getElementById('flash');
            const ticket = document.getElementById('anim-ticket');
            const portal = document.getElementById('portal');
            const starField = document.getElementById('star-field');

            // レアリティに応じた色の設定
            let glowColor, bgAccent;
            if (maxRarity === 5) { glowColor = '#ffd700'; bgAccent = '#3a2b00'; }
            else if (maxRarity === 4) { glowColor = '#c724b1'; bgAccent = '#2a0845'; }
            else { glowColor = '#00a8ff'; bgAccent = '#091e3b'; }

            document.documentElement.style.setProperty('--anim-glow', glowColor);
            document.documentElement.style.setProperty('--anim-bg', bgAccent);

            // ホワイトアウト解除し、アニメーション画面表示
            animScreen.style.display = 'block';
            flash.classList.remove('active-whiteout');

            // 星の生成
            starField.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const s = document.createElement('div');
                s.className = 'star-line';
                s.style.top = Math.random() * 100 + '%';
                s.style.left = Math.random() * 100 + '%';
                s.style.width = (Math.random() * 200 + 100) + 'px';
                s.style.animationDelay = (Math.random() * 0.4) + 's';
                starField.appendChild(s);
            }

            activePullResults = pullResults;
            isAnimationSkipped = false;

            // --- アニメーション再生 ---
            // 1. チケット舞う
            ticket.classList.add('animate-ticket');
            if (await smartWait(1800)) return;

            // 2. ワープ加速
            starField.classList.add('warp-active');
            if (await smartWait(800)) return;

            // 3. ポータル爆発
            portal.classList.add('portal-expand');
            if (await smartWait(1200)) return;

            // 4. ホワイトアウトして結果画面へ
            flash.classList.add('active-whiteout');
            if (await smartWait(600)) return;

            // クリーンアップ
            finishAnimation();
        }

        // スキップ対応の待機関数
        async function smartWait(ms) {
            return new Promise(resolve => {
                const check = setInterval(() => {
                    if (isAnimationSkipped) {
                        clearInterval(check);
                        resolve(true); // スキップされた
                    }
                }, 50);
                setTimeout(() => {
                    clearInterval(check);
                    resolve(false); // 時間通り終了
                }, ms);
            });
        }

        function skipEffect() {
            isAnimationSkipped = true;
            finishAnimation();
        }

        function finishAnimation() {
            const animScreen = document.getElementById('anim-screen');
            const flash = document.getElementById('flash');
            const ticket = document.getElementById('anim-ticket');
            const starField = document.getElementById('star-field');
            const portal = document.getElementById('portal');

            animScreen.style.display = 'none';
            ticket.classList.remove('animate-ticket');
            starField.classList.remove('warp-active');
            portal.classList.remove('portal-expand');
            flash.classList.remove('active-whiteout');

            // 新規キャラ演出シーケンスへ
            startRevealSequence(activePullResults);
        }

        // --- 6. 新規キャラ演出シーケンス ---
        let pendingResults = [];
        let revealQueue = [];
        let currentRevealIndex = 0;

        function clearSamTimer() {
            if (samImageTimer) {
                clearInterval(samImageTimer);
                samImageTimer = null;
            }
        }

        async function startRevealSequence(results) {
            pendingResults = results;
            // 星4か星5を演出対象とする（新規取得シミュレーション）
            revealQueue = results.filter(item => item.rarity >= 4);
            currentRevealIndex = 0;

            if (revealQueue.length > 0) {
                showNextReveal();
            } else {
                showResultScreen(pendingResults);
            }
        }

        function showNextReveal() {
            const item = revealQueue[currentRevealIndex];
            const screen = document.getElementById('reveal-screen');
            const img = document.getElementById('reveal-img');
            const bgImg = document.getElementById('reveal-bg-img');
            const nameEl = document.getElementById('reveal-name');
            const starsEl = document.getElementById('reveal-stars');
            const flash = document.getElementById('flash');

            // === 1. まず画面を完全にリセット ===
            screen.classList.remove('revealed');
            screen.style.display = 'none';
            flash.classList.remove('active-whiteout');

            // 演出クラスを全て外す（シルエット中は何も動かさない）
            img.classList.remove('char-breathing', 'char-altair-breathing', 'char-sam-breathing', 'char-dragon-breathing');
            img.style.opacity = '0';
            img.style.filter = 'brightness(0)';
            img.classList.remove('silhouette-transition');

            // 背景画像のリセット
            bgImg.src = '';
            bgImg.style.display = 'none';
            bgImg.style.filter = 'brightness(0)';
            bgImg.classList.remove('silhouette-transition');

            // FXレイヤーのクリア
            const fxLayer = document.getElementById('reveal-fx');
            fxLayer.className = '';
            fxLayer.innerHTML = '';
            clearSamTimer();

            // 名前のパース（【二つ名】名前 の形式なら分ける）
            const fullName = item.data.name;
            const match = fullName.match(/^(【.+?】)(.+)$/);
            if (match) {
                nameEl.innerHTML = `<div style="font-size: 1.4rem; opacity: 0.9; margin-bottom: 5px;">${match[1]}</div><div>${match[2]}</div>`;
            } else {
                nameEl.innerHTML = `<div>${fullName}</div>`;
            }

            let starStr = "";
            for (let i = 0; i < item.rarity; i++) starStr += "✦";
            starsEl.innerText = starStr;
            starsEl.className = `stars star${item.rarity}`;

            // アルタイルは背景画像を先にセット（シルエットとして表示するため）
            if (item.data.name.includes('アルタイル')) {
                bgImg.src = 'image/アルタイル背景.png';
                bgImg.style.display = 'block';
            }

            // === 2. 画像を読み込み、シルエットとして画面に表示 ===
            img.onload = () => {
                // 演出途中での切り替え（サム2等）の時は、透明度を戻すだけ
                if (img.src.includes('2.png') || img.src.includes('アルタイル2')) {
                    img.style.opacity = '1';
                    return;
                }

                // シルエット状態で画面を表示
                img.style.opacity = '1'; // brightness(0)なので真っ黒のまま見える
                if (bgImg.src && bgImg.src !== location.href) bgImg.style.display = 'block';
                screen.style.display = 'flex';

                // === 3. 1秒後にシルエット解除（明転） ===
                setTimeout(() => {
                    img.classList.add('silhouette-transition');
                    bgImg.classList.add('silhouette-transition');
                    // トランジションを付けてからfilterを変える→滑らかに明転
                    requestAnimationFrame(() => {
                        img.style.filter = 'brightness(1)';
                        bgImg.style.filter = 'brightness(1)';
                        screen.classList.add('revealed');
                    });
                }, 1000);

                // === 4. 明転完了後（+1s）に演出を開始 ===
                setTimeout(() => {
                    // トランジションを外す（呼吸アニメの邪魔をしない）
                    img.classList.remove('silhouette-transition');
                    bgImg.classList.remove('silhouette-transition');
                    img.style.filter = '';
                    bgImg.style.filter = '';

                    // キャラごとの演出クラスを付与
                    if (item.data.name.includes('サム')) {
                        img.classList.add('char-sam-breathing');
                        fxLayer.classList.add('sam-fx');

                        const firstImgSrc = item.data.img;
                        const secondImgSrc = firstImgSrc.replace('」', '2」');
                        const preload = new Image();
                        preload.src = secondImgSrc;

                        const startTime = Date.now();
                        samImageTimer = setInterval(() => {
                            const elapsed = (Date.now() - startTime) % 8000;
                            if (elapsed > 5200 && elapsed < 7800) {
                                if (!img.src.includes('2.png')) {
                                    img.style.opacity = '0';
                                    img.src = secondImgSrc;
                                }
                            } else {
                                if (img.src.includes('2.png')) {
                                    img.style.opacity = '0';
                                    img.src = firstImgSrc;
                                }
                            }
                        }, 100);
                    } else if (item.data.name.includes('ホーリードラゴン')) {
                        img.classList.add('char-dragon-breathing');
                        fxLayer.classList.add('dragon-fx');

                        const shockwave = document.createElement('div');
                        shockwave.className = 'dragon-shockwave';
                        fxLayer.appendChild(shockwave);

                        for (let i = 0; i < 20; i++) {
                            const meteor = document.createElement('img');
                            meteor.className = 'dragon-meteor';
                            meteor.src = i % 2 === 0 ? 'image/隕石.png' : 'image/隕石2.png';
                            meteor.style.left = `${Math.random() * 120 - 10}%`;
                            meteor.style.animationDelay = `${Math.random() * 1.5}s`;
                            meteor.style.setProperty('--meteor-scale', 0.5 + Math.random() * 1.5);
                            fxLayer.appendChild(meteor);
                        }
                    } else if (item.data.name.includes('アルタイル')) {
                        img.classList.add('char-altair-breathing');
                        fxLayer.classList.add('altair-fx');

                        const firstImgSrc = item.data.img;
                        const secondImgSrc = 'image/「【銀河の妖狐】アルタイル2」.png';
                        const preload = new Image();
                        preload.src = secondImgSrc;

                        const afterAnim1 = document.createElement('img');
                        afterAnim1.className = 'altair-afterimage altair-afterimage-1';
                        afterAnim1.src = firstImgSrc;
                        fxLayer.appendChild(afterAnim1);

                        const afterAnim2 = document.createElement('img');
                        afterAnim2.className = 'altair-afterimage altair-afterimage-2';
                        afterAnim2.src = secondImgSrc;
                        fxLayer.appendChild(afterAnim2);

                        const attackFx = document.createElement('img');
                        attackFx.className = 'altair-charge-img';
                        attackFx.src = 'image/アルタイルエフェクト.png';
                        fxLayer.appendChild(attackFx);

                        const pillarFx = document.createElement('div');
                        pillarFx.className = 'altair-fire-pillar';
                        fxLayer.appendChild(pillarFx);

                        const startTime = Date.now();
                        samImageTimer = setInterval(() => {
                            const elapsed = (Date.now() - startTime) % 10000;
                            if (elapsed > 6400 && elapsed < 8500) {
                                if (!img.src.includes('アルタイル2')) {
                                    img.src = secondImgSrc;
                                }
                            } else {
                                if (img.src.includes('アルタイル2')) {
                                    img.src = firstImgSrc;
                                }
                            }
                        }, 100);
                    } else if (item.rarity === 5) {
                        img.classList.add('char-breathing');
                    }
                }, 2200); // 1秒wait + 1.2秒transition
            };

            img.src = item.data.img;
        }

        function nextReveal() {
            const screen = document.getElementById('reveal-screen');
            if (!screen.classList.contains('revealed')) return;

            // プレビューモード（リザルトからの個別表示）の場合は閉じるだけ
            if (screen.classList.contains('preview-mode')) {
                screen.style.display = 'none';
                screen.classList.remove('preview-mode');
                return;
            }

            currentRevealIndex++;
            if (currentRevealIndex < revealQueue.length) {
                // 次のレアキャラがいれば表示
                showNextReveal();
            } else {
                // 全員表示し終えたらリザルト画面へ
                screen.style.display = 'none';
                showResultScreen(pendingResults);
            }
        }

        // リザルト画面から個別に詳細を表示する関数
        function showCharacterDetail(item) {
            const screen = document.getElementById('reveal-screen');
            const img = document.getElementById('reveal-img');
            const bgImg = document.getElementById('reveal-bg-img');
            const nameEl = document.getElementById('reveal-name');
            const starsEl = document.getElementById('reveal-stars');

            img.style.opacity = '1';
            img.style.filter = ''; // シルエット状態をリセット
            img.src = item.data.img;
            
            // 背景画像のリセット
            bgImg.src = '';
            bgImg.style.display = 'none';
            bgImg.style.filter = '';

            clearSamTimer();

            // 名前のパース
            const fullName = item.data.name;
            const match = fullName.match(/^(【.+?】)(.+)$/);
            if (match) {
                nameEl.innerHTML = `<div style="font-size: 1.4rem; opacity: 0.9; margin-bottom: 5px;">${match[1]}</div><div>${match[2]}</div>`;
            } else {
                nameEl.innerHTML = `<div>${fullName}</div>`;
            }

            let starStr = "";
            for (let i = 0; i < item.rarity; i++) starStr += "✦";
            starsEl.innerText = starStr;
            starsEl.className = `stars star${item.rarity}`;

            // 星5なら演出（特定キャラは特殊）
            img.classList.remove('char-breathing', 'char-altair-breathing', 'char-sam-breathing', 'char-dragon-breathing');
            const fxLayer = document.getElementById('reveal-fx');
            fxLayer.className = '';
            fxLayer.innerHTML = '';

            if (item.data.name.includes('サム')) {
                img.classList.add('char-sam-breathing');
                fxLayer.classList.add('sam-fx');

                const firstImgSrc = item.data.img;
                const secondImgSrc = firstImgSrc.replace('」', '2」');
                const preload = new Image();
                preload.src = secondImgSrc;

                const startTime = Date.now();
                samImageTimer = setInterval(() => {
                    const elapsed = (Date.now() - startTime) % 8000;
                    if (elapsed > 5200 && elapsed < 7800) {
                        if (!img.src.includes('2.png')) {
                            img.style.opacity = '0';
                            img.src = secondImgSrc;
                        }
                    } else {
                        if (img.src.includes('2.png')) {
                            img.style.opacity = '0';
                            img.src = firstImgSrc;
                        }
                    }
                }, 100);
            } else if (item.data.name.includes('ホーリードラゴン')) {
                img.classList.add('char-dragon-breathing');
                fxLayer.classList.add('dragon-fx');

                const shockwave = document.createElement('div');
                shockwave.className = 'dragon-shockwave';
                fxLayer.appendChild(shockwave);

                for (let i = 0; i < 20; i++) {
                    const meteor = document.createElement('img');
                    meteor.className = 'dragon-meteor';
                    meteor.src = i % 2 === 0 ? 'image/隕石.png' : 'image/隕石2.png';
                    meteor.style.left = `${Math.random() * 120 - 10}%`;
                    meteor.style.animationDelay = `${Math.random() * 1.5}s`;
                    meteor.style.setProperty('--meteor-scale', 0.5 + Math.random() * 1.5);
                    fxLayer.appendChild(meteor);
                }
            } else if (item.data.name.includes('アルタイル')) {
                img.classList.add('char-altair-breathing');
                fxLayer.classList.add('altair-fx');
                bgImg.src = 'image/アルタイル背景.png';
                bgImg.style.display = 'block';

                const firstImgSrc = item.data.img;
                const secondImgSrc = 'image/「【銀河の妖狐】アルタイル2」.png';
                const preload = new Image();
                preload.src = secondImgSrc;

                const afterAnim1 = document.createElement('img');
                afterAnim1.className = 'altair-afterimage altair-afterimage-1';
                afterAnim1.src = firstImgSrc;
                fxLayer.appendChild(afterAnim1);

                const afterAnim2 = document.createElement('img');
                afterAnim2.className = 'altair-afterimage altair-afterimage-2';
                afterAnim2.src = secondImgSrc;
                fxLayer.appendChild(afterAnim2);

                const attackFx = document.createElement('img');
                attackFx.className = 'altair-charge-img';
                attackFx.src = 'image/アルタイルエフェクト.png';
                fxLayer.appendChild(attackFx);

                const pillarFx = document.createElement('div');
                pillarFx.className = 'altair-fire-pillar';
                fxLayer.appendChild(pillarFx);

                const startTime = Date.now();
                samImageTimer = setInterval(() => {
                    const elapsed = (Date.now() - startTime) % 10000;
                    if (elapsed > 6400 && elapsed < 8500) {
                        if (!img.src.includes('アルタイル2')) {
                            img.src = secondImgSrc;
                        }
                    } else {
                        if (img.src.includes('アルタイル2')) {
                            img.src = firstImgSrc;
                        }
                    }
                }, 100);
            } else if (item.rarity === 5) {
                img.classList.add('char-breathing');
            }

            // 即座に表示（シルエットなし・フラグセット）
            screen.classList.add('revealed');
            screen.classList.add('preview-mode');
            screen.style.display = 'flex';
        }

        // --- 7. 結果画面の構築 ---

        function showResultScreen(results) {
            const resultScreen = document.getElementById('result-screen');
            const container = document.getElementById('result-cards');
            const flash = document.getElementById('flash');

            container.innerHTML = ''; // クリア

            results.forEach((item, index) => {
                // 星の文字列生成 (✦✦✦✦✦)
                let starsHTML = '';
                for (let i = 0; i < item.rarity; i++) { starsHTML += '✦'; }

                // カードDOM生成
                const card = document.createElement('div');
                card.className = `char-card card-star${item.rarity}`;
                card.style.animationDelay = `${index * 0.1}s`; // 順番に出現させる

                // サムの場合、結果画面や図鑑では2枚目の画像を表示する
                let displayImg = item.data.img;
                if (item.data.name.includes('サム')) {
                    displayImg = displayImg.replace('」', '2」');
                }

                // アルタイルの場合、カード背景も表示する
                let bgHtml = '';
                if (item.data.name.includes('アルタイル')) {
                    bgHtml = `<img src="image/アルタイル背景.png" class="char-bg-img" alt="bg">`;
                }

                card.innerHTML = `
                    ${item.isNew ? '<div class="new-badge">NEW</div>' : ''}
                    ${bgHtml}
                    <img src="${displayImg}" class="char-img" alt="${item.data.name}">
                    <div class="char-info">
                        <div class="char-name">${item.data.name}</div>
                        <div class="stars star${item.rarity}">${starsHTML}</div>
                    </div>
                `;
                // クリック時に詳細表示（全身表示）
                card.onclick = () => showCharacterDetail(item);

                container.appendChild(card);
            });

            resultScreen.style.display = 'flex';

            // ホワイトアウト解除
            setTimeout(() => {
                flash.classList.remove('active-whiteout');
            }, 100);
        }

        // タイトルへ戻る処理
        function returnToTitle() {
            const flash = document.getElementById('flash');
            flash.classList.add('active-whiteout');

            setTimeout(() => {
                document.getElementById('result-screen').style.display = 'none';
                document.getElementById('title-screen').style.display = 'block';

                setTimeout(() => {
                    flash.classList.remove('active-whiteout');
                }, 100);
            }, 600);
        }

        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    </script>
</body>

</html>
