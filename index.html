<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game - Top</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            /* ボタンを下に */
        }

        .menu-bar {
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.7) 70%, transparent 100%);
            padding: 60px 0 80px 0;
            display: flex;
            justify-content: center;
            z-index: 10;
            animation: slideUp 1.2s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('image/タイトル画像.png');
            background-size: 80% auto;
            /* サイズを少し小さく */
            background-position: center 95%;
            /* さらに下に下げる */
            background-repeat: no-repeat;
        }

        /* アニメーションする光の粉 */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-110vh) scale(1);
                opacity: 0;
            }
        }

        .title-container {
            text-align: center;
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        .title-img {
            max-width: 80vw;
            max-height: 50vh;
            filter: drop-shadow(0 0 30px rgba(255, 200, 0, 0.3));
            margin-bottom: 40px;
        }

        .portal-buttons {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .portal-btn {
            position: relative;
            width: 200px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-family: 'Shippori Mincho', serif;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            border-radius: 4px;
        }

        .portal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .portal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffcc00;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 200, 0, 0.2);
            color: #ffcc00;
        }

        .portal-btn:hover::before {
            left: 100%;
        }

        .btn-sub {
            display: block;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #888;
            margin-top: 5px;
        }

        .portal-btn:hover .btn-sub {
            color: #aa8800;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: #444;
        }

        /* ゲームタイトルロゴ */
        .game-logo {
            position: absolute;
            bottom: 190px;
            /* さらに少し下へ */
            left: 5%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            animation: logoFadeIn 2s ease-out;
            pointer-events: none;
        }

        .logo-main {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 3.2rem;
            /* サイズ縮小 */
            font-weight: 900;
            font-style: italic;
            letter-spacing: -1px;
            color: #fff;
            text-transform: uppercase;
            line-height: 0.9;
            position: relative;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .logo-main::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 110%;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            transform: skewX(-20deg);
        }

        .logo-sub {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.3rem;
            /* サイズ縮小 */
            font-weight: 800;
            color: #fff2cc;
            /* より明るい発色に変更 */
            margin-top: 10px;
            margin-left: 10px;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(255, 220, 100, 0.8);
            border-left: 3px solid #ffcc00;
            padding-left: 12px;
        }

        /* ロゴに走る光のエフェクト */
        .logo-flare {
            position: absolute;
            top: 0;
            left: -150%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-30deg);
            animation: flareMove 8s infinite linear;
        }

        @keyframes flareMove {
            0% {
                left: -150%;
            }

            20% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        @keyframes logoFadeIn {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .logo-main {
                font-size: 2.5rem;
            }

            .logo-sub {
                font-size: 1.2rem;
            }

            .game-logo {
                top: 5%;
                left: 50%;
                transform: translateX(-50%);
                align-items: center;
            }

            .logo-sub {
                border-left: none;
                border-bottom: 2px solid #ffcc00;
                padding-left: 0;
                padding-bottom: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-container"></div>
    <div class="particles" id="particles"></div>

    <div class="game-logo">
        <div class="logo-main">
            STAR STRIKER
            <div class="logo-flare"></div>
        </div>
        <div class="logo-sub">星界の咆哮</div>
    </div>

    <!-- 下部の黒い帯メニュー -->
    <div class="menu-bar">
        <a href="gacha.html" class="portal-btn">
            <div class="btn-en">WARP</div>
            <div class="btn-jp">ガチャ</div>
        </a>
        <a href="party.html" class="portal-btn">
            <div class="btn-en">PARTY</div>
            <div class="btn-jp">編成</div>
        </a>
        <a href="game.html" class="portal-btn">
            <div class="btn-en">BATTLE</div>
            <div class="btn-jp">戦闘</div>
        </a>
        <a href="archive.html" class="portal-btn">
            <div class="btn-en">ARCHIVE</div>
            <div class="btn-jp">図鑑</div>
        </a>
    </div>

    <footer>&copy; 2026 Gacha RPG Project</footer>

    <script>
        // パーティクル生成
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 500; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';

            // 最初から画面全体に散らばるように配置
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';

            p.style.animationDuration = (Math.random() * 15 + 15) + 's';
            p.style.animationDelay = (Math.random() * -30) + 's'; // 負のディレイで既に動いている状態にする
            particlesContainer.appendChild(p);
        }
    </script>
</body>

</html>
