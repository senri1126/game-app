<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーティ編成 - STAR STRIKER</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --hsr-gold: #ffcc00;
            --hsr-blue: #00aaff;
            --rarity-5: #ffcc00;
            --rarity-4: #c724b1;
            --rarity-3: #00a8ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050508;
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('image/タイトル画像.png');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .nav-back {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-back:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--hsr-gold);
        }

        /* --- 編成エリア --- */
        .party-setup {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--hsr-gold);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .selected-character {
            width: 280px;
            height: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            /* 下に寄せる */
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            padding-bottom: 20px;
        }

        /* --- 2人編成用スロット --- */
        .selected-party-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .selected-character-slot {
            width: 260px;
            height: 160px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .selected-character-slot.active {
            border: 2px solid #00ffcc;
            background: rgba(0, 255, 204, 0.05);
        }

        .slot-empty-text {
            font-family: 'Shippori Mincho', serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .preview-img {
            max-height: 120px;
            object-fit: contain;
            z-index: 2;
        }

        .preview-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 8px;
            z-index: 3;
            text-align: center;
        }

        .preview-name {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .preview-rarity {
            font-size: 0.7rem;
            color: var(--hsr-gold);
        }

        /* --- キャラクターリスト --- */
        .char-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .char-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            padding-bottom: 10px;
        }

        .char-card-img {
            position: absolute;
            top: 10px;
            height: 60%;
            object-fit: contain;
            transition: 0.3s;
        }

        .char-card:hover .char-card-img {
            transform: scale(1.1);
        }

        .char-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .char-card.active {
            border-color: var(--hsr-gold);
            background: rgba(255, 204, 0, 0.1);
        }

        .char-card.active::after {
            content: 'SELECTED';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.6rem;
            background: var(--hsr-gold);
            color: #000;
            padding: 2px 6px;
            font-weight: 900;
            border-radius: 2px;
        }

        .char-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .char-name {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.2;
            height: 2.4em;
            overflow: hidden;
        }

        .rarity-stars {
            color: var(--hsr-gold);
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2rem;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .save-btn {
            margin-top: 30px;
            padding: 15px 60px;
            background: var(--hsr-gold);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4);
        }

        .save-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div class="bg-container"></div>

    <div class="container">
        <header>
            <h1>PARTY SETUP</h1>
            <a href="index.html" class="nav-back">タイトルに戻る</a>
        </header>

        <div class="selected-section">
            <div class="section-title">Battle Members (Max 2)</div>
            <div class="selected-party-container" id="party-preview-container">
                <div class="selected-character-slot" id="slot-0" onclick="deselectSlot(0)">
                    <div class="slot-empty-text">MEMBER 1</div>
                </div>
                <div class="selected-character-slot" id="slot-1" onclick="deselectSlot(1)">
                    <div class="slot-empty-text">MEMBER 2</div>
                </div>
            </div>
            <button id="save-btn" class="save-btn" disabled onclick="saveParty()">編成を確定する</button>
        </div>

        <div class="section-title">Character Collection</div>
        <div class="char-list-grid" id="char-list"></div>
    </div>

    <script>
        const CHAR_DB = [
            { name: "【銀河の妖狐】アルタイル", rarity: 5, icon: "🦊", img: "「【銀河の妖狐】アルタイル」星5.png", bg: "image/ガチャ/アルタイル背景.png" },
            { name: "【星の狩人】サム", rarity: 5, icon: "🏹", img: "「【星の狩人】サム2」星5.png" },
            { name: "【ホワイトホール】ホーリードラゴン", rarity: 5, icon: "🐉", img: "「【ホワイトホール】ホーリードラゴン」星5.png" },
            { name: "ソード将軍", rarity: 4, icon: "⚔️", img: "「ソード将軍」星4.png" },
            { name: "ゴールドゴーレム", rarity: 4, icon: "🧱", img: "「ゴールドゴーレム」星4.png" },
            { name: "聖ユニコーン", rarity: 4, icon: "🦄", img: "「聖ユニコーン」星4.png" },
            { name: "口裂け女", rarity: 4, icon: "👄", img: "「口裂け女」星4.png" },
            { name: "ドラゴンベビー", rarity: 4, icon: "🐲", img: "「ドラゴンベビー」星4.png" },
            { name: "モブ兵士A", rarity: 3, icon: "💂", img: "「モブ兵士A」星3.png" },
            { name: "モブ兵士B", rarity: 3, icon: "💂", img: "「モブ兵士B」星3.png" },
            { name: "狼男", rarity: 3, icon: "🐺", img: "「狼男」星3.png" },
            { name: "河童", rarity: 3, icon: "🐢", img: "「河童」星3.png" },
            { name: "ミノタウロス", rarity: 3, icon: "🐂", img: "「ミノタウロス」星3.png" },
            { name: "セイレーン", rarity: 3, icon: "🧜", img: "「セイレーン」星3.png" },
            { name: "ゴブリン", rarity: 3, icon: "👺", img: "「ゴブリン」星3.png" }
        ];

        const OBTAINED_KEY = 'game_app_obtained_chars';
        const PARTY_KEY = 'game_app_party';

        let selectedParty = [null, null];

        function init() {
            const saved = JSON.parse(localStorage.getItem(PARTY_KEY) || '[]');
            if (Array.isArray(saved)) {
                selectedParty = [saved[0] || null, saved[1] || null];
            }
            updatePreview();
            renderCollection();
        }

        function renderCollection() {
            const obtained = JSON.parse(localStorage.getItem(OBTAINED_KEY) || '[]');
            const listContainer = document.getElementById('char-list');
            listContainer.innerHTML = '';

            if (obtained.length === 0) {
                listContainer.innerHTML = '<div class="empty-msg">まだキャラクターを所持していません。<br>ガチャで仲間にしましょう！</div>';
                return;
            }

            const uniqueObtained = [...new Set(obtained)];
            const myChars = CHAR_DB.filter(dbChar => uniqueObtained.some(o => o.includes(dbChar.name)));

            if (myChars.length > 0) {
                myChars.forEach(char => {
                    const fullName = `「${char.name}」星${char.rarity}`;
                    const imgPath = `image/ガチャ/${char.img}`;
                    renderCard({ ...char, fullName: fullName, displayName: char.name, img: imgPath });
                });
            } else {
                uniqueObtained.forEach(name => {
                    const cleanName = name.split('」')[0].replace('「', '');
                    const rarity = name.includes('星5') ? 5 : (name.includes('星4') ? 4 : 3);
                    let icon = '👤';
                    const imgPath = `image/ガチャ/${name}.png`;
                    if (name.includes('アルタイル')) icon = '🦊';
                    const charData = { name: name, fullName: name, displayName: cleanName, rarity: rarity, icon: icon, img: imgPath };
                    if (name.includes('アルタイル')) charData.bg = "image/ガチャ/アルタイル背景.png";
                    renderCard(charData);
                });
            }
        }

        function renderCard(char) {
            const listContainer = document.getElementById('char-list');
            const card = document.createElement('div');
            card.className = 'char-card';
            const isSelected = selectedParty.some(p => p && p.name === char.name);
            if (isSelected) {
                card.classList.add('selected');
                card.innerHTML += `<div class="selected-badge">選択中</div>`;
            }
            if (char.bg) {
                card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('${char.bg}')`;
                card.style.backgroundSize = "cover";
                card.style.backgroundPosition = "center";
            }
            let visual = `<span class="char-icon">${char.icon}</span>`;
            if (char.img) visual = `<img src="${char.img}" class="char-card-img" alt="${char.displayName}">`;
            card.innerHTML += `
                ${visual}
                <div class="char-name" style="position:relative; z-index:2;">${char.displayName}</div>
                <div class="rarity-stars" style="position:relative; z-index:2;">${'★'.repeat(char.rarity)}</div>
            `;
            card.onclick = () => selectCharacter(char);
            listContainer.appendChild(card);
        }

        function selectCharacter(char) {
            // 既に編成にいるかチェック
            const existingIndex = selectedParty.findIndex(p => p && p.name === char.name);
            if (existingIndex !== -1) {
                selectedParty[existingIndex] = null; // 解除
            } else {
                // 空きスロットを探す
                const emptyIndex = selectedParty.indexOf(null);
                if (emptyIndex !== -1) {
                    selectedParty[emptyIndex] = char;
                } else {
                    // 空きがない場合は1枠目を入れ替え
                    selectedParty[0] = char;
                }
            }
            updatePreview();
            renderCollection();
        }

        function deselectSlot(index) {
            selectedParty[index] = null;
            updatePreview();
            renderCollection();
        }

        function updatePreview() {
            selectedParty.forEach((char, index) => {
                const slot = document.getElementById(`slot-${index}`);
                if (!slot) return;
                
                if (!char) {
                    slot.innerHTML = `<div class="slot-empty-text">MEMBER ${index + 1}</div>`;
                    slot.className = 'selected-character-slot';
                    slot.style.backgroundImage = 'none';
                    return;
                }

                slot.className = 'selected-character-slot active';
                if (char.bg) {
                    slot.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('${char.bg}')`;
                    slot.style.backgroundSize = "cover";
                    slot.style.backgroundPosition = "center";
                } else {
                    slot.style.backgroundImage = 'none';
                }

                let visual = `<div class="char-preview-icon">${char.icon}</div>`;
                if (char.img) {
                    visual = `<img src="${char.img}" class="preview-img" style="height:140px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(0,0,0,0.5));">`;
                }

                slot.innerHTML = `
                    ${visual}
                    <div class="preview-info">
                        <div class="preview-name">${char.displayName}</div>
                        <div class="preview-rarity">${'★'.repeat(char.rarity)}</div>
                    </div>
                `;
            });

            document.getElementById('save-btn').disabled = !selectedParty.some(p => p !== null);
        }

        function saveParty() {
            const finalParty = selectedParty.filter(p => p !== null);
            localStorage.setItem(PARTY_KEY, JSON.stringify(finalParty));
            const btn = document.getElementById('save-btn');
            btn.textContent = "保存しました！";
            btn.style.background = "#00ffcc";
            btn.style.color = "#000";
            setTimeout(() => {
                btn.textContent = "編成を確定する";
                btn.style.background = "";
                btn.style.color = "";
            }, 2000);
        }

        init();
    </script>
</body>

</html>
